<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    html, body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #app {
      height: 100vh; height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    #view-main {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #view-main.active {
      display: flex;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px calc(var(--nav-h) + 16px);
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
  </style>
  <title>TeleBox Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Boot / Auth -->
    <section id="view-boot" class="view active">
      <div class="boot-card elevation-2">
        <div class="logo-wrap">
          <img src="/logo-circle.png" alt="TeleBox" class="logo-circle" width="96" height="96" />
        </div>
        <h1 class="brand">TeleBox Panel</h1>
        <p class="muted" id="boot-msg">正在验证身份…</p>
        <div class="spinner" id="boot-spinner"></div>
        <button class="btn filled hidden" id="btn-retry">重试</button>
      </div>
    </section>

    <!-- Main shell -->
    <section id="view-main" class="view">
      <header class="app-bar elevation-2">
        <div class="app-bar-left">
          <img src="/logo-circle.png" alt="" class="logo-mini" width="36" height="36" />
          <div>
            <div class="app-title" id="app-title">TeleBox Panel</div>
            <div class="app-sub" id="app-sub">—</div>
          </div>
        </div>
        <button class="icon-btn" id="btn-refresh" title="刷新" aria-label="刷新">
          <span class="material-icons-round">refresh</span>
        </button>
      </header>

      <main class="content" id="content">
        <!-- Dashboard -->
        <div class="page" data-page="home">
          <div class="card elevation-1" id="home-status"></div>
        </div>

        <!-- TPM -->
        <div class="page hidden" data-page="tpm">
          <div class="toolbar">
            <div class="search-field">
              <span class="material-icons-round">search</span>
              <input id="tpm-q" type="search" placeholder="搜索插件名 / 描述" enterkeyhint="search" />
            </div>
            <button class="btn tonal" id="tpm-search-btn">搜索</button>
          </div>
          <div class="chip-row wrap" id="tpm-actions">
            <button class="chip" id="tpm-tab-remote" data-tpm-tab="remote">远程</button>
            <button class="chip outlined" id="tpm-tab-installed" data-tpm-tab="installed">已安装</button>
            <button class="chip outlined" id="tpm-source-btn">插件源</button>
            <button class="chip filled" id="tpm-update-all" style="margin-left:auto;background:var(--md-sys-color-tertiary);color:var(--md-sys-color-on-tertiary)">全部更新</button>
          </div>
          <div class="card elevation-1 stats-inline" id="tpm-stats"></div>
          <div class="list" id="tpm-list"></div>
        </div>

        <!-- Help & Plugins (merged) -->
        <div class="page hidden" data-page="plugins">
          <div class="toolbar">
            <div class="search-field">
              <span class="material-icons-round">search</span>
              <input id="plugins-q" type="search" placeholder="搜索插件名 / 命令" enterkeyhint="search" />
            </div>
            <button class="btn tonal" id="plugins-search-btn">搜索</button>
          </div>
          <div class="card elevation-1" id="plugins-overview"></div>
          <div class="list" id="plugins-list"></div>
        </div>

        <!-- Settings -->
        <div class="page hidden" data-page="settings">
          <div class="list" id="settings-list"></div>
          <div class="card elevation-1" id="settings-admin-card" style="display:none">
            <div class="card-title">管理员管理</div>
            <div class="form-row">
              <input id="admin-uid" type="number" inputmode="numeric" placeholder="Telegram user id" class="field" />
              <input id="admin-note" type="text" placeholder="备注（可选）" class="field" />
              <button class="btn filled" id="admin-add">添加</button>
            </div>
            <p class="muted small">仅 owner 可增删。Owner 始终拥有权限。</p>
            <div class="list" id="admins-list"></div>
          </div>
        </div>
        <div class="page hidden" data-page="settings-detail">
          <button class="btn text back-btn" data-go="settings">
            <span class="material-icons-round">arrow_back</span> 返回
          </button>
          <div class="card elevation-1">
            <div class="card-title" id="settings-detail-title">设置</div>
            <p class="muted" id="settings-detail-desc"></p>
            <form id="settings-form" class="form"></form>
            <div class="form-actions">
              <button type="submit" form="settings-form" class="btn filled" id="settings-save">保存</button>
            </div>
          </div>
        </div>
      </main>

      <nav class="nav-bar elevation-2">
        <button class="nav-item active" data-go="home">
          <span class="material-icons-round">home</span>
          <span>首页</span>
        </button>
        <button class="nav-item" data-go="tpm">
          <span class="material-icons-round">extension</span>
          <span>商城</span>
        </button>
        <button class="nav-item" data-go="plugins">
          <span class="material-icons-round">help_outline</span>
          <span>帮助</span>
        </button>
        <button class="nav-item" data-go="settings">
          <span class="material-icons-round">tune</span>
          <span>设置</span>
        </button>
      </nav>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Modal -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card elevation-3">
        <div class="modal-title" id="modal-title">提示</div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
